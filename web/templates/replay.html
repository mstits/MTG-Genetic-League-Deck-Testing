<!-- replay.html — Interactive game replay viewer with turn-by-turn navigation -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Replay - MTG Genetic League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0a0e1a;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
        }

        .glass {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(75, 85, 99, 0.4);
        }

        .card {
            width: 100px;
            height: 140px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.7rem;
            padding: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            cursor: default;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.5);
        }

        .card.land {
            background: #2f3e46;
            border: 1px solid #52606d;
            color: #a8b2bd;
        }

        .card.creature {
            background: #3730a3;
            border: 1px solid #6366f1;
            color: white;
        }

        .card.token {
            background: #064e3b;
            border: 1px solid #10b981;
            color: #a7f3d0;
        }

        .card.other {
            background: #4b5563;
            border: 1px solid #9ca3af;
            color: #f3f4f6;
        }

        /* Tapped state simulation if we had it */
        .tapped {
            transform: rotate(90deg);
        }

        .zone {
            min-height: 160px;
            display: flex;
            gap: 8px;
            padding: 10px;
            overflow-x: auto;
            align-items: center;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/mana-font@latest/css/mana.css" rel="stylesheet" type="text/css" />
</head>

<body class="text-gray-200 h-screen flex flex-col">

    <!-- Persistent Navigation Header -->
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/"
                    class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 font-extrabold text-lg tracking-tight">🧬
                    MTG Genetic League</a>
                <div class="hidden md:flex gap-4">
                    <a href="/"
                        class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Dashboard</a>
                    <a href="/matches"
                        class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Matches</a>
                    <a href="/admin/butterfly"
                        class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Admin Portal</a>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.6)]">
                </div>
                <span class="text-xs font-mono text-green-400">System Online</span>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-gray-900/90 z-10">
        <a href="/matches" class="text-gray-400 hover:text-white text-sm">← Exit Replay</a>
        <div class="text-white font-bold" id="game-title">Game 1</div>
        <div class="flex gap-2">
            <button onclick="prevTurn()"
                class="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs">Previous</button>
            <span id="turn-display" class="w-20 text-center font-mono text-indigo-400">Turn 1</span>
            <button onclick="nextTurn()"
                class="px-3 py-1 bg-indigo-600 hover:bg-indigo-500 rounded text-xs">Next</button>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <!-- Evaluation Bar -->
        <div class="w-10 bg-gray-950 border-r border-gray-800 flex flex-col relative shadow-[inset_0_0_10px_rgba(0,0,0,0.8)]"
            title="Win Probability (Chess Evaluation Bar)">
            <div id="eval-bar-p2"
                class="w-full bg-red-800/80 transition-all duration-500 ease-in-out border-b border-gray-900"
                style="height: 50%;"></div>
            <div id="eval-bar-p1" class="w-full bg-blue-800/80 transition-all duration-500 ease-in-out"
                style="height: 50%;"></div>

            <!-- Contextual marker -->
            <div id="eval-marker"
                class="absolute left-0 w-full h-0.5 bg-yellow-400 z-10 transition-all duration-500 ease-in-out"
                style="top: 50%;"></div>

            <div class="absolute inset-0 flex flex-col justify-between items-center py-4 pointer-events-none">
                <span class="text-[10px] font-mono font-bold text-red-200 z-20" id="eval-text-p2">50</span>
                <span class="text-[10px] font-mono font-bold text-blue-200 z-20" id="eval-text-p1">50</span>
            </div>
        </div>

        <!-- Main Board -->
        <div
            class="flex-1 flex flex-col bg-[url('https://c1.scryfall.com/file/scryfall-cards/art_crop/front/3/9/39d51c5e-26cb-4276-a676-fabfef86620f.jpg?1562906281')] bg-cover bg-center">
            <div class="flex-1 bg-gray-900/90 backdrop-blur-sm flex flex-col p-4 relative">

                <!-- Opponent (Top) -->
                <div class="flex flex-col border-b border-gray-700/50 pb-2">
                    <div class="flex justify-between items-end px-4 mb-2">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-400"></div>
                            <span class="font-bold text-red-200" id="p2-name">Opponent</span>
                        </div>
                        <div class="flex gap-4 text-sm font-mono">
                            <span class="text-gray-400" title="Salt Bracket">🧂 <span id="p2-salt">?</span></span>
                            <span class="text-red-400">♥ <span id="p2-hp">20</span></span>
                            <span class="text-blue-400">🎴 <span id="p2-cards">7</span></span>
                            <span class="text-yellow-600">🏔️ <span id="p2-lands">0</span></span>
                        </div>
                    </div>
                    <!-- Opponent Battlefield -->
                    <div class="zone" id="p2-board">
                        <!-- Cards go here -->
                    </div>
                </div>

                <!-- Center Message / Phase -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none">
                    <div id="phase-indicator" class="text-4xl font-black text-white/10 uppercase tracking-widest">
                        combats</div>
                </div>

                <!-- Player (Bottom) -->
                <div class="flex flex-col flex-1 justify-end pt-2">
                    <!-- Player Battlefield -->
                    <div class="zone" id="p1-board">
                        <!-- Cards go here -->
                    </div>

                    <div class="flex justify-between items-start px-4 mt-2 pt-2 border-t border-gray-700/50">
                        <div class="flex items-center gap-2">
                            <div class="w-3 h-3 rounded-full bg-blue-400"></div>
                            <span class="font-bold text-blue-200" id="p1-name">Me</span>
                        </div>
                        <div class="flex gap-4 text-sm font-mono">
                            <span class="text-gray-400" title="Salt Bracket">🧂 <span id="p1-salt">?</span></span>
                            <span class="text-red-400">♥ <span id="p1-hp">20</span></span>
                            <span class="text-blue-400">🎴 <span id="p1-cards">7</span></span>
                            <span class="text-yellow-600">🏔️ <span id="p1-lands">0</span></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Log Sidebar -->
        <div class="w-80 bg-gray-900 border-l border-gray-800 flex flex-col">
            <div class="p-3 border-b border-gray-800 font-bold text-gray-400 text-xs uppercase">Action Log</div>
            <div id="log-container" class="flex-1 overflow-y-auto p-4 space-y-2 text-xs font-mono text-gray-400">
                <!-- Log entries -->
            </div>
        </div>
    </div>

    <!-- Data Injection -->
    <script>
        const matchData = {{ match_data | tojson }};
        const p1Bracket = {{ d1_bracket | default ('1') }};
        const p2Bracket = {{ d2_bracket | default ('1') }};
        console.log("Loaded Match Data:", matchData);

        let currentGameIdx = 0;
        let currentTurnIdx = 0;

        function getGame() { return matchData.games[currentGameIdx]; }
        function getTurn() { return getGame().turns[currentTurnIdx]; }

        function renderCard(name) {
            let type = 'other';
            if (['Island', 'Mountain', 'Swamp', 'Forest', 'Plains'].some(l => name.includes(l))) type = 'land';
            if (name.includes('Token') || name.includes('Creature')) type = 'token';
            // Simple heuristic for creature vs other based on name? Hard without metadata.
            // Assume other for now unless Land.

            return `<div class="card ${type}">
                <div class="font-bold leading-tight">${name}</div>
            </div>`;
        }

        function updateUI() {
            const turn = getTurn();
            if (!turn) return;

            // Update Labels
            document.getElementById('turn-display').innerText = `Turn ${turn.turn_num}`;
            document.getElementById('p1-name').innerText = turn.p1.name;
            document.getElementById('p2-name').innerText = turn.p2.name;

            // Stats
            document.getElementById('p1-hp').innerText = turn.p1.hp;
            document.getElementById('p1-cards').innerText = turn.p1.cards;
            document.getElementById('p1-lands').innerText = turn.p1.lands;
            document.getElementById('p1-salt').innerText = p1Bracket;

            document.getElementById('p2-hp').innerText = turn.p2.hp;
            document.getElementById('p2-cards').innerText = turn.p2.cards;
            document.getElementById('p2-lands').innerText = turn.p2.lands;
            document.getElementById('p2-salt').innerText = p2Bracket;

            // Boards
            const p1BoardEl = document.getElementById('p1-board');
            p1BoardEl.innerHTML = turn.p1.board.map(renderCard).join('');

            const p2BoardEl = document.getElementById('p2-board');
            p2BoardEl.innerHTML = turn.p2.board.map(renderCard).join('');

            // Update Evaluation Bar (Win Probability)
            if (turn.win_prob !== undefined) {
                // win_prob is P1's advantage (0 to 1) 
                const p1Perc = Math.max(0, Math.min(100, turn.win_prob * 100));
                const p2Perc = 100 - p1Perc;

                document.getElementById('eval-bar-p2').style.height = `${p2Perc}%`;
                document.getElementById('eval-bar-p1').style.height = `${p1Perc}%`;

                document.getElementById('eval-text-p1').innerText = p1Perc.toFixed(0);
                document.getElementById('eval-text-p2').innerText = p2Perc.toFixed(0);

                document.getElementById('eval-marker').style.top = `${p2Perc}%`;

                // Highlight Punts (Swings > 15%)
                if (currentTurnIdx > 0) {
                    const prevTurn = getGame().turns[currentTurnIdx - 1];
                    if (prevTurn && prevTurn.win_prob !== undefined) {
                        const delta = Math.abs(turn.win_prob - prevTurn.win_prob);
                        if (delta > 0.15) {
                            document.getElementById('eval-marker').classList.add('bg-white', 'shadow-[0_0_15px_rgba(255,255,255,1)]', 'scale-y-[2]');
                            document.getElementById('eval-marker').classList.remove('bg-yellow-400');
                        } else {
                            document.getElementById('eval-marker').classList.add('bg-yellow-400');
                            document.getElementById('eval-marker').classList.remove('bg-white', 'shadow-[0_0_15px_rgba(255,255,255,1)]', 'scale-y-[2]');
                        }
                    }
                }
            }

            // Log - Highlight current actions
            const logEl = document.getElementById('log-container');
            logEl.innerHTML = '';

            // Show logs up to current turn
            // Implementation detail: Should we show ALL logs or just current turn?
            // Let's show current turn's actions.
            turn.actions.forEach(line => {
                const div = document.createElement('div');
                const lc = line.toLowerCase();

                // Color-code different event types for visual richness
                if (lc.includes('lifelink') || lc.includes('gains') && lc.includes('life')) {
                    div.className = "p-2 rounded bg-green-900/40 border-l-2 border-green-500 text-green-300";
                } else if (lc.includes('deals') && lc.includes('damage') || lc.includes('deals') && lc.includes('life')) {
                    div.className = "p-2 rounded bg-red-900/30 border-l-2 border-red-500 text-red-300";
                } else if (lc.includes('sba:') || lc.includes('dies') || lc.includes('destroy')) {
                    div.className = "p-2 rounded bg-red-900/40 border-l-2 border-red-600 text-red-400 font-bold";
                } else if (lc.includes('prowess') || lc.includes('ability') || lc.includes('trigger') || lc.includes('+1/+1')) {
                    div.className = "p-2 rounded bg-purple-900/40 border-l-2 border-purple-500 text-purple-300";
                } else if (lc.includes('token') || lc.includes('creates')) {
                    div.className = "p-2 rounded bg-yellow-900/30 border-l-2 border-yellow-500 text-yellow-300";
                } else if (lc.includes('draw') || lc.includes('draws')) {
                    div.className = "p-2 rounded bg-blue-900/30 border-l-2 border-blue-500 text-blue-300";
                } else if (lc.includes('attacks') || lc.includes('blocking')) {
                    div.className = "p-2 rounded bg-orange-900/30 border-l-2 border-orange-500 text-orange-300 font-semibold";
                } else if (lc.includes('casts') || lc.includes('announces')) {
                    div.className = "p-2 rounded bg-indigo-900/40 border-l-2 border-indigo-500 text-indigo-300";
                } else if (lc.includes('plays') && !lc.includes('board')) {
                    div.className = "p-2 rounded bg-gray-800/50 border-l-2 border-gray-500 text-gray-400";
                } else if (lc.includes('taps') || lc.includes('for ')) {
                    div.className = "p-1.5 rounded bg-gray-800/30 border-l-2 border-gray-600 text-gray-500 text-[10px]";
                } else if (lc.startsWith('→') || lc.startsWith('targeting')) {
                    div.className = "p-2 rounded bg-cyan-900/30 border-l-2 border-cyan-500 text-cyan-300";
                } else {
                    div.className = "p-2 rounded bg-gray-800/50 border-l-2 border-gray-600 text-gray-400";
                }

                div.innerText = line;
                logEl.appendChild(div);
            });
        }

        function nextTurn() {
            const game = getGame();
            if (currentTurnIdx < game.turns.length - 1) {
                currentTurnIdx++;
                updateUI();
            }
        }

        function prevTurn() {
            if (currentTurnIdx > 0) {
                currentTurnIdx--;
                updateUI();
            }
        }

        // Initial Render
        updateUI();

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextTurn();
            if (e.key === 'ArrowLeft') prevTurn();
        });
    </script>

    <!-- Dev Footer -->
    <footer class="bg-gray-900 border-t border-gray-800 py-6 mt-12 w-full">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center text-xs text-gray-500">
            <div>MTG Simulator Alpha v0.9 • 2026 Engine Rules 100% Core</div>
            <div class="flex gap-4">
                <a href="/admin/butterfly" class="hover:text-indigo-400 transition-colors flex items-center gap-1">
                    ⚙️ Admin Portal
                </a>
                <a href="https://github.com/MTGGeneticLeague" class="hover:text-white transition-colors"
                    target="_blank">GitHub Repo</a>
            </div>
        </div>
    </footer>

</body>

</html>
