version: '3.8'

# ─── MTG Genetic League — Docker Compose ────────────────────────────────────
# Copy .env.example to .env before running: cp .env.example .env
# All sensitive values (passwords, keys) are sourced from .env

services:
  # ─── Web Application ────────────────────────────────────────────────────────
  web:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file: .env
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Simulation Worker ──────────────────────────────────────────────────────
  sim-worker:
    build: .
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    env_file: .env
    command: python worker.py

  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ─── Milvus Dependencies (etcd, minio) ─────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"

  # ─── Milvus Vector DB (card similarity search) ─────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.3.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19530:19530"

volumes:
  postgres_data:
  etcd_data:
  minio_data:
